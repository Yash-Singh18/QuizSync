services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  # Singleton background worker: scheduler + leaderboard broadcaster.
  # Run exactly one instance (leader election is Phase 4).
  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
