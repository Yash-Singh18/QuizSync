services:
  - type: web
    name: quizsync-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    autoDeploy: true
    branch: release
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false      # anon key
      - key: SUPABASE_SERVICE_KEY
        sync: false      # service-role key (never expose to client)

  - type: web
    name: quizsync-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    branch: release
    envVars:
      - key: VITE_API_URL
        sync: false   # set to https://quizsync-api-vdjl.onrender.com in Render dashboard
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

# Key Value (Redis) service intentionally omitted until Phase 2 — needs a paid
# plan and there's no payment method on the Render account yet. Redis stays
# local-only (docker-compose) for now; backend/app/config.py already defaults
# REDIS_URL to localhost so this is a no-op until then.
